<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel - Apply Pannu Bro</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>
<body>
  <header class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Admin Panel</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="adminNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="services.html" target="_blank">View Services</a></li>
          <li class="nav-item"><a class="nav-link" href="jobs.html" target="_blank">View Jobs</a></li>
        </ul>
      </div>
    </div>
  </header>
  <main class="container py-5">
    <h1 class="mb-4">Manage Content</h1>
    <ul class="nav nav-tabs" id="adminTab" role="tablist">
      <li class="nav-item" role="presentation"><button class="nav-link active" id="services-tab" data-bs-toggle="tab" data-bs-target="#services" type="button" role="tab" aria-controls="services" aria-selected="true">Services</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" id="jobs-tab" data-bs-toggle="tab" data-bs-target="#jobs" type="button" role="tab" aria-controls="jobs" aria-selected="false">Jobs</button></li>
    </ul>
    <div class="tab-content mt-4" id="adminTabContent">
      <!-- Services Management -->
      <div class="tab-pane fade show active" id="services" role="tabpanel" aria-labelledby="services-tab">
        <h2 class="mb-3">Services</h2>
        <button class="btn btn-success mb-3" id="add-service-btn"><i class="bi bi-plus-lg"></i> Add Service</button>
        <div id="services-table"></div>
      </div>
      <!-- Jobs Management -->
      <div class="tab-pane fade" id="jobs" role="tabpanel" aria-labelledby="jobs-tab">
        <h2 class="mb-3">Jobs</h2>
        <button class="btn btn-success mb-3" id="add-job-btn"><i class="bi bi-plus-lg"></i> Add Job</button>
        <div id="jobs-table"></div>
      </div>
    </div>
  </main>
  <script src="js/admin.js"></script>
</body>
</html>
